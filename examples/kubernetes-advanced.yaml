# ==========================================================================
# Goma Gateway — Advanced Kubernetes deployment via the Goma Gateway Operator
# ==========================================================================
#
# Requires the Goma Gateway Operator and its CRDs:
#
#   kubectl apply -f https://raw.githubusercontent.com/jkaninda/goma-operator/main/dist/install.yaml
#
# Operator project:    https://github.com/jkaninda/goma-operator
# Operator examples:   https://github.com/jkaninda/goma-operator/tree/main/examples
# CRD reference:       gateway.jkaninda.dev/v1alpha1 (Gateway, Route, Middleware)
#
# This file demonstrates a complete production-style stack:
#   - A LoadBalancer Gateway on standard 80/443 with HPA, metrics, and ACME.
#   - A JWT middleware and a per-IP rate-limit middleware.
#   - A public route (rate-limited) and an authenticated API route.
# ==========================================================================

---
## Gateway: platform-level configuration
apiVersion: gateway.jkaninda.dev/v1alpha1
kind: Gateway
metadata:
  name: gateway
  namespace: default
spec:
  # Container image. See https://github.com/jkaninda/goma-gateway/releases.
  image: jkaninda/goma-gateway:latest
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Expose the gateway as a LoadBalancer on standard 80/443.
  service:
    type: LoadBalancer
    httpPort: 80
    httpsPort: 443
    externalTrafficPolicy: Local       # preserve client source IPs

  # Horizontal Pod Autoscaler. Requires metrics-server.
  autoScaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  server:
    logLevel: info
    timeouts:
      read: 30
      write: 60
      idle: 90

    # Optional: shared state across replicas (rate-limit counters, ACME store).
    # redis:
    #   addr: redis.default.svc.cluster.local:6379
    #   password: ""

    # Prometheus metrics on /metrics. /healthz and /readyz are always on.
    monitoring:
      enableMetrics: true
      metricsPath: /metrics

  # Built-in ACME / Let's Encrypt certificate manager (HTTP-01).
  # The gateway must be publicly reachable on :80 for the challenge.
  certManager:
    provider: acme
    acme:
      email: ops@example.com
      termsAccepted: true
      challengeType: http-01
      # For testing, switch to staging to avoid rate limits:
      # directoryUrl: https://acme-staging-v02.api.letsencrypt.org/directory

---
## Middleware: JWT validation
apiVersion: gateway.jkaninda.dev/v1alpha1
kind: Middleware
metadata:
  name: api-jwt
  namespace: default
spec:
  type: jwtAuth
  rule:
    jwksUrl: https://auth.example.com/.well-known/jwks.json
    issuer: https://auth.example.com/
    audience: api.example.com
    algorithms:
      - RS256
    forwardHeaders:
      X-User-Id: sub
      X-User-Email: email

---
## Middleware: per-IP rate limiter
apiVersion: gateway.jkaninda.dev/v1alpha1
kind: Middleware
metadata:
  name: api-rate-limit
  namespace: default
spec:
  type: rateLimit
  rule:
    requestsPerUnit: 300
    unit: minute
    burst: 50

---
## Route: public marketing site (rate-limited only)
apiVersion: gateway.jkaninda.dev/v1alpha1
kind: Route
metadata:
  name: www
  namespace: default
spec:
  gateways:
    - gateway
  path: /
  hosts:
    - www.example.com
    - example.com
  target: http://www.default.svc.cluster.local:80
  middlewares:
    - api-rate-limit

---
## Route: authenticated API behind JWT + rate limit, with health checks
apiVersion: gateway.jkaninda.dev/v1alpha1
kind: Route
metadata:
  name: api
  namespace: default
spec:
  gateways:
    - gateway
  path: /
  hosts:
    - api.example.com
  backends:
    # 80/20 weighted split between two API versions.
    - endpoint: http://api-v1.default.svc.cluster.local:8080
      weight: 80
    - endpoint: http://api-v2.default.svc.cluster.local:8080
      weight: 20
  healthCheck:
    path: /healthz
    interval: 15s
    timeout: 3s
    healthyStatuses:
      - 200
      - 204
  security:
    forwardHostHeaders: true
    enableExploitProtection: true
  middlewares:
    - api-jwt
    - api-rate-limit
